<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Serval — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f9fafb;color:#111827;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.box{max-width:380px;width:90%}
.brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:28px;font-size:16px;font-weight:700}
.brand .dot{width:8px;height:8px;background:#d97706;border-radius:2px}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{text-align:center;font-size:13px;color:#4b5563;margin-bottom:20px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px}
.fg input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.fg input:focus{border-color:#d97706}
.btn{width:100%;padding:12px;background:#111827;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.btn:hover{background:#000}
.error{color:#dc2626;font-size:12px;margin-top:8px;display:none;text-align:center}
.success{margin-top:16px;padding:14px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;display:none;text-align:center}
.success a{display:inline-block;margin:6px 4px;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600}
.links{text-align:center;margin-top:16px;font-size:13px}
.links a{color:#d97706;text-decoration:none}
</style></head><body>
<div class="box">
  <div class="brand"><div class="dot"></div>Serval</div>
  <h1>Welcome back</h1>
  <div class="sub">Login with your email and password</div>
  <div class="card">
    <div class="fg"><label>Email</label><input type="email" id="l-email" placeholder="you@company.com"/></div>
    <div class="fg"><label>Password</label><input type="password" id="l-pw" placeholder="Password"/></div>
    <button class="btn" onclick="login()">Login →</button>
    <div class="error" id="l-error"></div>
    <div class="success" id="l-success">
      <div style="font-size:14px;font-weight:600;color:#059669;margin-bottom:8px">✅ Login successful!</div>
      <a id="link-chat" href="#" style="background:#111827;color:#fff">Employee Chat →</a>
      <a id="link-mgr" href="#" style="background:#f9fafb;color:#111827;border:1px solid #e5e7eb">Manager Dashboard →</a>
    </div>
  </div>
  <div class="links"><a href="/setup">Don't have an account? Setup →</a></div>
</div>
<script>
document.getElementById('l-pw').addEventListener('keypress',e=>{if(e.key==='Enter')login()});
const lastEmail = localStorage.getItem('serval_last_email');
if(lastEmail) document.getElementById('l-email').value = lastEmail;

async function login(){
  const email = document.getElementById('l-email').value.trim();
  const pw = document.getElementById('l-pw').value;
  const err = document.getElementById('l-error');
  err.style.display='none';

  if(!email||!pw){err.textContent='Fill all fields';err.style.display='block';return;}

  try{
    const res = await fetch('/api/verify-manager',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, password:pw})
    });
    const t = await res.text(); const d = JSON.parse(t);
    if(d.success){
      localStorage.setItem('serval_last_company', d.companyId);
      localStorage.setItem('serval_last_email', email);
      localStorage.setItem('serval_mgr_'+d.companyId, 'ok');
      // Show links
      document.getElementById('link-chat').href = '/app/'+d.companyId+'/chat';
      document.getElementById('link-mgr').href = '/app/'+d.companyId+'/manager';
      document.getElementById('l-success').style.display='block';
    } else {
      err.textContent = d.error === 'not found' ? 'Email not registered' : 'Wrong password';
      err.style.display='block';
    }
  }catch(e){err.textContent='Connection error';err.style.display='block';}
}
</script>
</body></html>
